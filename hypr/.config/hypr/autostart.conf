# Extra autostart processes
# exec-once = uwsm-app -- my-service
#

#keyring fix exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = omarchy-toggle-nightlight

#gpu crash
# Environment variables for Aquamarine backend
env = AQ_DRM_NO_EXPLICIT_SYNC,1
env = AQ_NO_HARDWARE_CURSORS,1

#change mouse cursor
exec-once=hyprctl setcursor volantes_cursors 28
exec-once=otd-daemon

